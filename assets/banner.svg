<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b" />
      <stop offset="50%" stop-color="#15102a" />
      <stop offset="100%" stop-color="#05020a" />
    </linearGradient>

    <!-- Banner Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2">
        <animate attributeName="stop-color" values="#8a2be2;#00f2fe;#4facfe;#8a2be2" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00f2fe">
        <animate attributeName="stop-color" values="#00f2fe;#f355da;#8a2be2;#00f2fe" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .title {
      font-family: 'Outfit', 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      font-size: 52px;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .subtitle {
      font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
      font-weight: 400;
      font-size: 20px;
      fill: #a0aec0;
      letter-spacing: 1px;
    }
    .window-rect {
      stroke: url(#accentGrad);
      stroke-width: 2.5;
      fill: rgba(0, 242, 254, 0.03);
      filter: drop-shadow(0px 0px 8px rgba(0, 242, 254, 0.4));
      animation: pulse 4s infinite alternate ease-in-out;
    }
    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(0.98); }
      100% { opacity: 0.8; transform: scale(1.02); }
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Abstract Sliding Window Blocks (Visual Art) -->
  <g transform="translate(100, 100)">
    <!-- Local tokens representation -->
    <circle cx="1000" cy="100" r="12" fill="#8a2be2" opacity="0.6">
      <animate attributeName="r" values="12;16;12" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="950" cy="100" r="8" fill="#00f2fe" opacity="0.8" />
    <circle cx="900" cy="100" r="8" fill="#00f2fe" opacity="0.8" />
    <circle cx="850" cy="100" r="8" fill="#00f2fe" opacity="0.8" />
    <circle cx="800" cy="100" r="12" fill="#8a2be2" opacity="0.6">
      <animate attributeName="r" values="12;8;12" dur="3.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Sliding Window Indicator -->
    <rect x="830" y="70" width="140" height="60" rx="10" class="window-rect" />
  </g>

  <!-- Content -->
  <text x="80" y="190" class="title">Awesome Sliding Window Attention</text>
  <text x="85" y="240" class="subtitle">Evolution, Variants, Types, &amp; Hardware Implementations</text>

  <!-- Subtle glow line at the bottom -->
  <rect x="0" y="395" width="1200" height="5" fill="url(#accentGrad)" />
</svg>
